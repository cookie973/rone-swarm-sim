# ========================================
# formation_configs.yaml — 队形定义
# ========================================
# 每种队形为 6 架无人机定义相对于领航者 (0,0,0) 的偏移量 [x, y, z] (ENU, m)

formations:
  diamond:
    # 菱形编队
    offsets:
      - [0.0,  0.0,  0.0]     # 领航者
      - [-3.0, 3.0,  0.0]
      - [-3.0, -3.0, 0.0]
      - [-6.0, 0.0,  0.0]
      - [-6.0, 6.0,  0.0]
      - [-6.0, -6.0, 0.0]

  v_shape:
    # V 字形编队
    offsets:
      - [0.0,  0.0,  0.0]
      - [-3.0, 3.0,  0.0]
      - [-3.0, -3.0, 0.0]
      - [-6.0, 6.0,  0.0]
      - [-6.0, -6.0, 0.0]
      - [-9.0, 9.0,  0.0]

  line:
    # 线性编队
    offsets:
      - [0.0,   0.0, 0.0]
      - [-4.0,  0.0, 0.0]
      - [-8.0,  0.0, 0.0]
      - [-12.0, 0.0, 0.0]
      - [-16.0, 0.0, 0.0]
      - [-20.0, 0.0, 0.0]

  circle:
    # 圆形编队 (半径 5m)
    offsets:
      - [5.0,    0.0,    0.0]
      - [2.5,    4.33,   0.0]
      - [-2.5,   4.33,   0.0]
      - [-5.0,   0.0,    0.0]
      - [-2.5,  -4.33,   0.0]
      - [2.5,   -4.33,   0.0]
